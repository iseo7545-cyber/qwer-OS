# Zen Kernel Configuration for qwer OS
# Optimized for desktop responsiveness and gaming

# --- Kernel Type ---
# We use Zen Sources for the best desktop experience
KERNEL_PACKAGE="sys-kernel/zen-sources"

# --- Build Options ---
# Automatically include firmware and build initramfs
GENKERNEL_OPTS="--menuconfig --install --symlink --save-config --kernel-config=/etc/portage/kernel-config-zen"

# --- Zen Specific Tweaks ---
# These are handled via the Zen patchset, but we ensure the scheduler 
# is set to MUQSS or PDS if available in the selected version.
# Default: BmQ/PDS scheduler for better interactivity.
