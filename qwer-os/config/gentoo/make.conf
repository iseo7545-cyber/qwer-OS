# /etc/portage/make.conf for qwer OS
# Optimized for a beginner-friendly GUI experience

# --- Compiler Optimization ---
# -O2: High performance while maintaining stability
# -march=x86-64-v3: Target modern CPUs (AVX2 support) for better speed
# -pipe: Faster compilation by using pipes instead of temp files
CFLAGS="-O2 -march=x86-64-v3 -pipe"
CXXFLAGS="${CFLAGS}"
FCFLAGS="${CFLAGS}"
FFLAGS="${CFLAGS}"

# --- Parallel Build Settings ---
# -j$(nproc): Use all available CPU cores for compilation
# --load-average: Prevent system from freezing during heavy builds
MAKEOPTS="-j$(nproc) -l$(nproc)"
EMERGE_DEFAULT_OPTS="--with-bdeps=y --ask --verbose --jobs=$(nproc) --load-average=$(nproc)"

# --- Global USE Flags ---
# Optimized for KDE, GNOME, XFCE, Multimedia, and Desktop usage
# '-' prefix disables unnecessary features (e.g., server-side, legacy)
USE="X wayland dbus policykit elogind networkmanager pulseaudio alsa \
     jpeg png tiff gif svg pdf postscript \
     mp3 mp4 flac ogg vorbis \
     nls unicode icu \
     branding kipi \
     -systemd -aqua -css -gnome-online-accounts -kde-telepathy -libressl"

# --- Video & Input Support ---
# Broad support for common GPUs and input devices
VIDEO_CARDS="amdgpu radeonsi intel iris nouveau nvidia"
INPUT_DEVICES="libinput synaptics"

# --- Language & Localization ---
# Default to Korean and English support
L10N="ko en en-US"
LINGUAS="ko en"

# --- Portage Behavior ---
# Use faster mirrors and keep the system stable
ACCEPT_KEYWORDS="amd64"
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# --- Security & Misc ---
# Enable basic security features
PYTHON_TARGETS="python3_11 python3_12"
RUBY_TARGETS="ruby31 ruby32"
GENTOO_MIRRORS="https://mirror.kaist.ac.kr/gentoo/ http://ftp.kaist.ac.kr/gentoo/"
