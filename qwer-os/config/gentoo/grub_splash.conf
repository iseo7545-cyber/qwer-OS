# /etc/default/grub settings for qwer OS
# To enable the graphical boot logo

# 1. Add 'quiet splash' to the kernel parameters
# quiet: hides system log messages
# splash: enables the Plymouth logo screen
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash udev.log_priority=3 vt.global_cursor_default=0"

# 2. Set the resolution for the logo screen
GRUB_GFXMODE=1920x1080x32
GRUB_GFXPAYLOAD_LINUX=keep

# 3. Add qwer OS Branding to the GRUB Menu
GRUB_DISTRIBUTOR="qwer OS"
# You can also set a background image for the GRUB menu itself
# GRUB_BACKGROUND="/usr/share/plymouth/themes/qwer-logo/logo.png"
